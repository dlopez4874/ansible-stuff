---
- name: update with pacman first
  hosts: arch
  ignore_errors: true
  tasks: 
  - name: run pacman
    community.general.pacman:
      update_cache: true
      upgrade: true
      state: latest
    register: pacman_results
  - name: print pacman results with debug command if changes were made
    debug:
      var: pacman_results
    when: pacman_results.changed or pacman_results.failed
    changed_when: true

- name: update AUR packages with yay
  hosts: arch
  become_user: daniel
  ignore_errors: true
  tasks:
  - name: run yay
    kewlfft.aur.aur:
      upgrade: true
      use: yay
      state: latest
      aur_only: true
    register: yay_results
  - name: print yay results with debug command if changes were made
    debug:
      var: yay_results
    when: yay_results.changed or yay_results.failed
    changed_when: true
  - name: print date
    shell: date
    changed_when: false
    register: date_output
  - name: debug date variable
    debug:
      var: date_output.stdout

  - name: Packages upgraded in last 6h (store to var)
    ansible.builtin.shell: |
      paclog --after "$(date -Iminutes --date '6 hours ago')" | paclog --action=upgrade
    args:
      executable: /bin/bash
    register: upgraded_names
    changed_when: false
    failed_when: false
  - name: Show upgraded package names
    ansible.builtin.debug:
      var: upgraded_names.stdout_lines
