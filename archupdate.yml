---
- name: update with pacman first
  hosts: arch
  ignore_errors: true
  tasks: 
  - name: run pacman
    community.general.pacman:
      update_cache: true
      upgrade: true
      state: latest
    register: pacman_results
  - name: print pacman results with debug command if changes were made
    debug:
      var: pacman_results
    when: pacman_results.changed or pacman_results.failed
    changed_when: true

- name: update AUR packages with yay
  hosts: arch
  become_user: daniel
  ignore_errors: true
  tasks:
  - name: run yay
    kewlfft.aur.aur:
      upgrade: true
      use: yay
      state: latest
      aur_only: true
    register: yay_results
  - name: print yay results with debug command if changes were made
    debug:
      var: yay_results
    when: yay_results.changed or yay_results.failed
    changed_when: true
  - name: print date
    shell: date
    changed_when: false
    register: date_output
  - name: debug date variable
    debug:
      var: date_output.stdout

  - name: Packages upgraded in last 6h (store to var)
    ansible.builtin.shell: |
      paclog --after "$(date -Iminutes --date '6 hours ago')" | paclog --action=upgrade
    args:
      executable: /bin/bash
    register: upgraded_names
    changed_when: false
    failed_when: false
  - name: Show upgraded package names
    ansible.builtin.debug:
      var: upgraded_names.stdout_lines

- name: Prune pacman package cache (keep 2 versions)
  hosts: arch
  become: true
  tasks:
    - name: Ensure pacman-contrib is installed (provides paccache)
      community.general.pacman:
        name: pacman-contrib
        state: present

    - name: Prune cache for installed packages (keep 2)
      ansible.builtin.command: paccache -r -k 2 -v --nocolor
      register: paccache_keep2
      changed_when: "'.pkg.tar' in (paccache_keep2.stdout + paccache_keep2.stderr)"

    - name: Show pruned cache entries (keep 2)
      ansible.builtin.debug:
        msg: "{{ paccache_keep2.stdout_lines + paccache_keep2.stderr_lines }}"
      when: paccache_keep2.changed
      changed_when: false

    - name: Prune cache for uninstalled packages (keep 0)
      ansible.builtin.command: paccache -r -u -k 0 -v --nocolor
      register: paccache_uninst
      changed_when: "'.pkg.tar' in (paccache_uninst.stdout + paccache_uninst.stderr)"

    - name: Show pruned cache entries (uninstalled)
      ansible.builtin.debug:
        msg: "{{ paccache_uninst.stdout_lines + paccache_uninst.stderr_lines }}"
      when: paccache_uninst.changed
      changed_when: false
