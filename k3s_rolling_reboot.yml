---
# k3s_rolling_reboot.yml — Graceful k3s Node Reboot Playbook
#
# Drains, reboots, and uncordons each node one at a time.
# Workers are rebooted first, the control plane last.
# Cluster remains available throughout.
#
# Usage:
#   playbook k3s_rolling_reboot.yml
#
# Override control plane node if needed:
#   playbook k3s_rolling_reboot.yml -e "k3s_control_plane=archnode002"
#
# Note on XCP-ng VMs: the network interface transitions to "No route to host"
# very abruptly during reboot. pre_reboot_delay and post_reboot_delay on the
# control plane task give Ansible time to set up reconnection polling before
# the network drops, and wait for it to fully stabilize before reconnecting.

- name: Gracefully reboot k3s worker nodes
  hosts: arch
  serial: 1
  become: true
  vars:
    k3s_control_plane: archnode001
    kubectl: "kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml"

  tasks:

    - name: Skip — control plane is handled in the next play
      meta: end_host
      when: inventory_hostname == k3s_control_plane

    - name: Drain node
      shell: "{{ kubectl }} drain {{ ansible_fqdn }} --ignore-daemonsets --delete-emptydir-data --timeout=90s"
      delegate_to: "{{ k3s_control_plane }}"

    - name: Reboot node
      reboot:
        reboot_timeout: 300
        pre_reboot_delay: 5
        post_reboot_delay: 15
        connect_timeout: 15
        test_command: uptime

    - name: Wait for node to be Ready
      shell: "{{ kubectl }} wait node/{{ ansible_fqdn }} --for=condition=Ready --timeout=120s"
      delegate_to: "{{ k3s_control_plane }}"
      register: node_ready
      until: node_ready.rc == 0
      retries: 6
      delay: 10
      changed_when: false

    - name: Uncordon node
      shell: "{{ kubectl }} uncordon {{ ansible_fqdn }}"
      delegate_to: "{{ k3s_control_plane }}"


- name: Gracefully reboot k3s control plane last
  hosts: arch
  become: true
  vars:
    k3s_control_plane: archnode001
    kubectl: "kubectl --kubeconfig=/etc/rancher/k3s/k3s.yaml"

  tasks:

    - name: Skip — worker nodes were handled in the previous play
      meta: end_host
      when: inventory_hostname != k3s_control_plane

    - name: Drain control plane node
      shell: "{{ kubectl }} drain {{ ansible_fqdn }} --ignore-daemonsets --delete-emptydir-data --timeout=90s"

    - name: Reboot control plane
      reboot:
        reboot_timeout: 300
        pre_reboot_delay: 10
        post_reboot_delay: 30
        connect_timeout: 15
        test_command: uptime

    - name: Wait for k3s API server to be reachable
      shell: "{{ kubectl }} get nodes"
      register: api_ready
      until: api_ready.rc == 0
      retries: 12
      delay: 10
      changed_when: false

    - name: Wait for control plane node to be Ready
      shell: "{{ kubectl }} wait node/{{ ansible_fqdn }} --for=condition=Ready --timeout=120s"
      register: cp_ready
      until: cp_ready.rc == 0
      retries: 6
      delay: 10
      changed_when: false

    - name: Uncordon control plane node
      shell: "{{ kubectl }} uncordon {{ ansible_fqdn }}"
